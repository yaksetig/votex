name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # tsc -b follows the project references (tsconfig.app.json is strict);
      # plain `tsc --noEmit` on the solution config (files: []) checks nothing.
      - run: npx tsc -b
      - run: npm run lint
      - run: npm run audit:production

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  edge-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Type-check edge functions
        run: |
          for f in supabase/functions/*/index.ts; do
            echo "deno check $f"
            deno check --no-lock --node-modules-dir=none "$f"
          done
      - name: Test edge functions
        run: deno test --no-lock --node-modules-dir=none --allow-env supabase/functions/

  circuit-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: circuits/package-lock.json
      - name: Cache Circomspect binary
        id: cache-circomspect
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/circomspect
          key: circomspect-0.9.0-${{ runner.os }}
      - run: npm ci --prefix circuits
      - name: Install Circomspect
        if: steps.cache-circomspect.outputs.cache-hit != 'true'
        run: cargo install circomspect --version 0.9.0 --locked
      - run: npm run analyze:circuits

  build:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test, edge-functions, circuit-analysis]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  browser-tests:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
