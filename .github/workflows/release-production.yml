name: Release production

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: votex-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    if: >-
      vars.PRODUCTION_RELEASE_ENABLED == 'true' &&
      ((github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'))
    runs-on: ubuntu-latest
    environment: production
    env:
      EXPECTED_RELEASE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VOTEX_APP_URL: ${{ vars.VOTEX_APP_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.EXPECTED_RELEASE_SHA }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: npm ci
      - name: Validate release configuration
        run: npm run release:check
      - name: Require deployment credentials
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN" || (echo "Missing SUPABASE_ACCESS_TOKEN" >&2; exit 1)
          test -n "$SUPABASE_DB_PASSWORD" || (echo "Missing SUPABASE_DB_PASSWORD" >&2; exit 1)
          test -n "$VITE_SUPABASE_ANON_KEY" || (echo "Missing VITE_SUPABASE_ANON_KEY" >&2; exit 1)
          test -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" || (echo "Missing CLOUDFLARE_API_TOKEN" >&2; exit 1)
          test -n "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" || (echo "Missing CLOUDFLARE_ACCOUNT_ID" >&2; exit 1)
          test -n "${{ vars.CLOUDFLARE_PAGES_PROJECT }}" || (echo "Missing CLOUDFLARE_PAGES_PROJECT" >&2; exit 1)
      - name: Link production database
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"
      - name: Apply committed migrations
        run: supabase db push --linked --include-all --password "$SUPABASE_DB_PASSWORD" --yes
      - name: Deploy the complete Edge Function manifest
        run: supabase functions deploy --project-ref "$SUPABASE_PROJECT_ID"
      - name: Rebuild the exact frontend release
        env:
          VOTEX_RELEASE_SHA: ${{ env.EXPECTED_RELEASE_SHA }}
        run: npm run build
      - name: Publish the exact validated artifact to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy dist
            --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT }}
            --branch=main
            --commit-hash=${{ env.EXPECTED_RELEASE_SHA }}
      - name: Verify the complete live release
        run: npm run release:verify
