
<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Node globals shim: some deps (circomlibjs → util/assert) reference
         `process`/`global`, which don't exist in the browser. Idempotent and
         harmless in production. -->
    <script>
      window.global ||= window;
      window.process ||= {
        env: {},
        versions: {},
        platform: "browser",
        nextTick: function (cb) { Promise.resolve().then(cb); },
      };
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="author" content="Votex" />

    <meta property="og:title" content="Votex" />

    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>

  </body>
</html>
